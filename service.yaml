notes:
  - This service starts as a static public surface; backend-owned data and private user flows stay out of this repository.
  - Cross-cutting product standards are owned by zdp-architecture/docs/45-cross-cutting-product-standards.md.
  - Performance budget follows the initial public-web defaults from zdp-architecture/docs/45-cross-cutting-product-standards.md, including LCP <= 2.5s, INP <= 200ms, CLS <= 0.1, and initial JS gzip <= 200KB unless a reviewed exception is added.
  - Performance measurement method is the zdp_web_public_bundle_analyze CI build gate plus Lighthouse or Core Web Vitals review before public launch.
  - Security headers for the public web deployment must declare Content-Security-Policy, Strict-Transport-Security, X-Content-Type-Options, Referrer-Policy, Permissions-Policy, and frame-ancestors; CSP unsafe-inline and unsafe-eval stay disabled unless a nonce, hash, or reviewed exception is added.
  - Public discovery files must not contain internal URLs, staging URLs, private customer data, or non-public architecture documents.
  - Public feeds must be generated as static build artifacts once real public content exists; runtime feed generation is not the default.
  - Glossary explanations use stable term_id values, click-triggered right sheet and bottom sheet surfaces, and data-zdp-ad-exclude sheet roots. Hover-only glossary UI is not allowed because it fails touch and focus constraints.
  - Glossary term contracts live under glossary/terms YAML and locale copy lives under glossary/locales/<locale> YAML; bun run glossary:generate derives src/content/glossary-manifest.json through the zdp-platform-devex glossary manifest builder.
  - bun run check must fail on stale glossary-manifest.json instead of regenerating it before the freshness check.
  - Canonical public content paths are locale-prefixed; English is the default and fallback locale, non-locale paths are static negotiation entries, and unsupported locale prefixes use the static 404 fallback until an edge route contract exists.
  - The first zdp-platform-localization product canary is intentionally limited to the home hero title and CTA messages; it must include complete en and ko messages, and broader public copy migration needs a separate review.
  - home hero localization dogfood only; keep static Astro copy rollback available before expanding to more public copy.
  - bun run check:localization runs zdp-platform-localization catalog check and strict production compile; fallback messages are not allowed in the public site localization manifest.
  - Static Astro copy remains the rollback boundary for the localization canary, so this static public site does not require a runtime feature flag.
  - Glossary term sheets do not include ad slots; AdSense, Ezoic, or another provider may only be considered through a separate detail-page experiment contract.
  - Client deployment environment naming and preview/production contamination rules are consumed from zdp-client-infra contracts/env-contract.yaml; this public site does not define its own secret or deployment variable policy.
