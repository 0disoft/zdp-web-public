name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    name: repository-contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check automation contract
        shell: bash
        run: |
          set -euo pipefail

          test -f renovate.json
          test ! -f .github/dependabot.yml
          test -f .github/labeler.yml
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f .github/ISSUE_TEMPLATE/bug.yml
          grep -R "비밀값" .github/ISSUE_TEMPLATE .github/PULL_REQUEST_TEMPLATE.md
          grep -R "결제 payload" .github/ISSUE_TEMPLATE .github/PULL_REQUEST_TEMPLATE.md
          grep -R "고객 원문 데이터" .github/ISSUE_TEMPLATE .github/PULL_REQUEST_TEMPLATE.md

  public-site:
    name: public-site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: projects/zdp-platforms/client-surfaces/zdp-web-public

    steps:
      - name: Checkout web public
        uses: actions/checkout@v7
        with:
          path: projects/zdp-platforms/client-surfaces/zdp-web-public

      - name: Checkout design system
        uses: actions/checkout@v7
        with:
          repository: 0disoft/zdp-design-system
          token: ${{ secrets.ZDP_CI_READ_TOKEN || github.token }}
          path: projects/zdp-platforms/client-surfaces/zdp-design-system

      - name: Checkout localization platform
        uses: actions/checkout@v7
        with:
          repository: 0disoft/zdp-platform-localization
          token: ${{ secrets.ZDP_CI_READ_TOKEN || github.token }}
          path: projects/zdp-platforms/platform/zdp-platform-localization

      - name: Checkout platform devex
        uses: actions/checkout@v7
        with:
          repository: 0disoft/zdp-platform-devex
          token: ${{ secrets.ZDP_CI_READ_TOKEN || github.token }}
          path: projects/zdp-platforms/platform/zdp-platform-devex

      - name: Checkout library contracts
        uses: actions/checkout@v7
        with:
          repository: 0disoft/zdp-libs-ts
          token: ${{ secrets.ZDP_CI_READ_TOKEN || github.token }}
          path: projects/zdp-platforms/contracts/zdp-libs-ts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install localization platform dependencies
        working-directory: projects/zdp-platforms/platform/zdp-platform-localization
        run: bun install --frozen-lockfile

      - name: Install design system dependencies
        working-directory: projects/zdp-platforms/client-surfaces/zdp-design-system
        run: bun install --frozen-lockfile

      - name: Build design system package
        working-directory: projects/zdp-platforms/client-surfaces/zdp-design-system
        run: bun run package:build

      - name: Install web public dependencies
        run: bun install --no-save

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build
